<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Certificates — BAUET CS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/bcsDashboard.css">
</head>
<body>

<!-- Navbar -->
<header class="dashboard-navbar">
  <div class="logo">
    <img src="../pic/csepic.jpeg" alt="BAUET Logo">
    <span>BAUET Computer Society</span>
  </div>
  <nav>
    <a href="../html code/cse.html"><i class="fa-solid fa-house"></i> Home</a>
    <a href="../html code/bcsProfile.html"><i class="fa-solid fa-user"></i> Profile</a>
  </nav>
  <div class="menu-icon" id="menuIcon"><i class="fa-solid fa-bars"></i></div>
</header>

<!-- Side Menu -->
<div class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <div class="side-avatar" id="sideAvatar">?</div>
    <p id="sideName">Member</p>
  </div>
  <a href="../html code/cse.html"><i class="fa-solid fa-house"></i> Home</a>
  <a href="../html code/bcsDashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
  <a href="../html code/bcsProfile.html"><i class="fa-solid fa-user"></i> Profile</a>
  <a href="../html code/bcsEvents.html"><i class="fa-solid fa-calendar"></i> Events</a>
  <a href="../html code/bcsParticipation.html"><i class="fa-solid fa-laptop"></i> My Participation</a>
  <a href="../html code/bcsCertificates.html" class="active-link"><i class="fa-solid fa-award"></i> My Certificates</a>
  <a href="#" id="sideLogout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>
<div class="side-overlay" id="sideOverlay"></div>

<!-- Back Button -->
<button class="back-btn-fixed" onclick="window.history.back()">
  <i class="fa-solid fa-arrow-left"></i>
</button>

<!-- Hero -->
<section class="dashboard-hero">
  <div class="hero-inner">
    <div class="avatar-circle" id="avatarCircle">?</div>
    <div class="hero-text">
      <h1>My <span style="color:#00bfff">Certificates</span></h1>
      <div class="member-meta-row">
        <span><i class="fa-solid fa-award"></i> Total: <span id="totalCount">0</span></span>
      </div>
    </div>
  </div>
</section>

<!-- Content -->
<div class="dashboard-content" style="grid-template-columns: 1fr;">
  <section class="dash-section">
    <div class="section-header">
      <h2><i class="fa-solid fa-award"></i> My Certificates</h2>
    </div>
    <div id="certificatesContainer"></div>
  </section>
</div>

<!-- Logout Toast -->
<div class="logout-toast" id="logoutToast">
  <i class="fa-solid fa-right-from-bracket"></i> Logged out successfully!
</div>

<script src="../backend/config.js"></script>
<script src="../java script/bcsCertificates.js"></script>
</body>
</html>
