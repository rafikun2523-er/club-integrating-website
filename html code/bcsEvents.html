<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAUET Computer Society — Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bcsEvents.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- Navbar -->
<header class="dashboard-navbar">
  <div class="logo">
    <img src="../pic/csepic.jpeg" alt="BAUET Logo">
    <span>BAUET Computer Society</span>
  </div>
  <nav>
    <a href="../html code/bcsDashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="../html code/bcsProfile.html"><i class="fa-solid fa-user"></i> Profile</a>
    <div class="notification-wrapper">
      <a href="#" id="notificationBell"><i class="fa-solid fa-bell"></i> Notifications</a>
      <div id="notificationDropdown" class="notification-dropdown">
        <h4><i class="fa-solid fa-bell"></i> Notifications</h4>
        <ul id="notificationList"><li>No new notifications</li></ul>
      </div>
    </div>
  </nav>
  <div class="menu-icon" id="menuIcon"><i class="fa-solid fa-bars"></i></div>
</header>

<!-- Side Menu -->
<div class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <div class="side-avatar" id="sideAvatar">?</div>
    <p id="sideName">Member</p>
  </div>
  <a href="../html code/bcsDashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
  <a href="../html code/bcsProfile.html"><i class="fa-solid fa-user"></i> Profile</a>
  <a href="../html code/bcsEvents.html" class="active-link"><i class="fa-solid fa-calendar"></i> Events</a>
  <a href="#"><i class="fa-solid fa-laptop"></i> My Participation</a>
  <a href="#"><i class="fa-solid fa-award"></i> My Certificates</a>
  <a href="#" id="sideLogout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>
<div class="side-overlay" id="sideOverlay"></div>

<!-- Back Button -->
<button class="back-btn-fixed" onclick="goBack()">
  <i class="fa-solid fa-arrow-left"></i>
</button>
<script>
function goBack() {
  if (document.referrer) { window.history.back(); }
  else { window.location.href = "../html code/bcsDashboard.html"; }
}
</script>

<!-- Hero -->
<section class="dashboard-hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1><i class="fa-solid fa-calendar-days"></i> Events</h1>
      <p>Stay updated with all BAUET Computer Society events.</p>
    </div>
  </div>
</section>

<!-- Events Section -->
<section class="events-section">

  <!-- Tabs -->
  <div class="events-tabs">
    <button class="tab-btn active" data-tab="upcoming">
      <i class="fa-solid fa-calendar-check"></i> Upcoming
    </button>
    <button class="tab-btn" data-tab="past">
      <i class="fa-solid fa-clock-rotate-left"></i> Past
    </button>
  </div>

  <!-- Events List -->
  <div class="events-container" id="eventsContainer">
    <div class="empty-msg">
      <i class="fa-solid fa-calendar-xmark"></i>
      <p>No upcoming events yet. Stay tuned!</p>
    </div>
  </div>

</section>

<!-- Logout Toast -->
<div class="logout-toast" id="logoutToast">
  <i class="fa-solid fa-right-from-bracket"></i> Logged out successfully!
</div>

<script src="../java script/bcsEvents.js"></script>
</body>
</html>
